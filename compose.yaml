services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hephaestus-frontend
    ports:
      - "3001:80"
    environment:
      VITE_API_BASE_URL: https://localhost:7168
    depends_on:
      - hephaestus

  hephaestus:
    image: hephaestus
    build:
      context: .
      dockerfile: Hephaestus/Dockerfile

  postgres:
    image: postgres:18
    container_name: my_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"